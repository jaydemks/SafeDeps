name: SafeDeps

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  dependency-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check cross-package version consistency
        run: python scripts/check_versions.py
      - name: Install test/runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install .
      - name: Run tests
        run: python -m pytest -q
      - name: Scan dependency policy
        run: |
          safedeps scan . \
            --fail-on HIGH \
            --out security-artifacts \
            --sarif security-artifacts/safedeps.sarif \
            --cyclonedx security-artifacts/safedeps.cdx.json \
            --spdx security-artifacts/safedeps.spdx.json
      - name: Validate compliance artifacts
        run: python scripts/validate_artifacts.py security-artifacts
      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: safedeps-security-artifacts
          path: security-artifacts/
