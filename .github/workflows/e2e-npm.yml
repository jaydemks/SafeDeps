name: E2E - npm Validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    name: npm scan - Node ${{ matrix.node-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install SafeDeps from checkout
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Scan blocks floating npm dependency
        shell: bash
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          project="$RUNNER_TEMP/safedeps-npm-scan"
          mkdir -p "$project"
          cd "$project"
          cat > package.json <<'JSON'
          {
            "name": "safedeps-npm-scan",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "^4.17.21"
            }
          }
          JSON
          if python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts; then
            echo "Expected floating npm dependency scan to fail."
            exit 1
          fi
      - name: Scan blocks floating npm dependency
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $project = Join-Path $env:RUNNER_TEMP "safedeps-npm-scan"
          New-Item -ItemType Directory -Force -Path $project | Out-Null
          Set-Location $project
          @'
          {
            "name": "safedeps-npm-scan",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "^4.17.21"
            }
          }
          '@ | Set-Content -Path package.json
          python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Expected floating npm dependency scan to fail."
            exit 1
          }
          exit 0
      - name: Scan allows pinned npm dependency with lockfile
        shell: bash
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          project="$RUNNER_TEMP/safedeps-npm-clean"
          mkdir -p "$project"
          cd "$project"
          cat > package.json <<'JSON'
          {
            "name": "safedeps-npm-clean",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "4.17.21"
            }
          }
          JSON
          npm install --package-lock-only --ignore-scripts
          python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts
      - name: Scan allows pinned npm dependency with lockfile
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $project = Join-Path $env:RUNNER_TEMP "safedeps-npm-clean"
          New-Item -ItemType Directory -Force -Path $project | Out-Null
          Set-Location $project
          @'
          {
            "name": "safedeps-npm-clean",
            "version": "1.0.0",
            "dependencies": {
              "lodash": "4.17.21"
            }
          }
          '@ | Set-Content -Path package.json
          npm install --package-lock-only --ignore-scripts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: npm ci lockfile smoke
        shell: bash
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          project="$RUNNER_TEMP/safedeps-npm-ci"
          mkdir -p "$project"
          cd "$project"
          cat > package.json <<'JSON'
          {
            "name": "safedeps-npm-ci",
            "version": "1.0.0",
            "dependencies": {
              "is-number": "7.0.0"
            }
          }
          JSON
          npm install --package-lock-only --ignore-scripts
          npm ci --ignore-scripts
          python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts
      - name: npm ci lockfile smoke
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $project = Join-Path $env:RUNNER_TEMP "safedeps-npm-ci"
          New-Item -ItemType Directory -Force -Path $project | Out-Null
          Set-Location $project
          @'
          {
            "name": "safedeps-npm-ci",
            "version": "1.0.0",
            "dependencies": {
              "is-number": "7.0.0"
            }
          }
          '@ | Set-Content -Path package.json
          npm install --package-lock-only --ignore-scripts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm ci --ignore-scripts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Scan detects npm workspace aliases and source dependencies
        shell: bash
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          project="$RUNNER_TEMP/safedeps-npm-source-policy"
          mkdir -p "$project/packages/app"
          cd "$project"
          cat > package.json <<'JSON'
          {
            "name": "safedeps-npm-source-policy",
            "version": "1.0.0",
            "workspaces": ["packages/*"],
            "dependencies": {
              "alias-lodash": "npm:lodash@^4.17.21",
              "git-risk": "git+https://example.test/repo.git",
              "tar-risk": "https://example.test/pkg-1.0.0.tgz",
              "local-risk": "file:../local-risk"
            }
          }
          JSON
          cat > packages/app/package.json <<'JSON'
          {"name":"workspace-app","version":"1.0.0","dependencies":{"left-pad":"1.3.0"}}
          JSON
          echo '{"packages":{}}' > package-lock.json
          if python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts; then
            echo "Expected npm source policy scan to fail."
            exit 1
          fi
      - name: Scan detects npm workspace aliases and source dependencies
        shell: pwsh
        if: runner.os == 'Windows'
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $project = Join-Path $env:RUNNER_TEMP "safedeps-npm-source-policy"
          New-Item -ItemType Directory -Force -Path (Join-Path $project "packages/app") | Out-Null
          Set-Location $project
          @'
          {
            "name": "safedeps-npm-source-policy",
            "version": "1.0.0",
            "workspaces": ["packages/*"],
            "dependencies": {
              "alias-lodash": "npm:lodash@^4.17.21",
              "git-risk": "git+https://example.test/repo.git",
              "tar-risk": "https://example.test/pkg-1.0.0.tgz",
              "local-risk": "file:../local-risk"
            }
          }
          '@ | Set-Content -Path package.json
          '{"name":"workspace-app","version":"1.0.0","dependencies":{"left-pad":"1.3.0"}}' | Set-Content -Path packages/app/package.json
          '{"packages":{}}' | Set-Content -Path package-lock.json
          python -m safedeps.cli scan . --fail-on HIGH --out security-artifacts
          if ($LASTEXITCODE -eq 0) {
            Write-Error "Expected npm source policy scan to fail."
            exit 1
          }
          exit 0

  runtime-guard-experimental:
    name: npm runtime guard experimental - ${{ matrix.shell }} on ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: windows-latest
            shell: pwsh
          - os: windows-latest
            shell: cmd
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: Install SafeDeps from checkout
        shell: bash
        if: matrix.shell == 'bash'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Install SafeDeps from checkout
        shell: pwsh
        if: matrix.shell == 'pwsh'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Install SafeDeps from checkout
        shell: cmd
        if: matrix.shell == 'cmd'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Bash runtime guard blocks unpinned npm install
        shell: bash
        if: matrix.shell == 'bash'
        run: |
          bash scripts/e2e/npm_guard_bash.sh
      - name: PowerShell runtime guard blocks unpinned npm install
        shell: pwsh
        if: matrix.shell == 'pwsh'
        run: |
          ./scripts/e2e/npm_guard_pwsh.ps1
      - name: CMD runtime guard blocks unpinned npm install
        shell: cmd
        if: matrix.shell == 'cmd'
        run: |
          call scripts\e2e\npm_guard_cmd.bat
