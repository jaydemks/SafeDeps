name: SafeDeps Release Template

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to release (e.g. 0.2.1)
        required: true
      publish:
        description: Publish artifacts to registries (true/false)
        required: true
        default: "false"

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.publish == 'true' && inputs.release_version && format('v{0}', inputs.release_version) || github.ref }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Run release preflight checks
        run: |
          EXPECTED_VERSION="${{ inputs.release_version }}"
          if [ -z "$EXPECTED_VERSION" ]; then
            EXPECTED_VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ "${{ inputs.publish }}" = "true" ]; then
            export GITHUB_REF_NAME="v${EXPECTED_VERSION}"
          fi
          python scripts/release/preflight.py --expected-version "$EXPECTED_VERSION" ${{ (inputs.publish == 'true' || startsWith(github.ref, 'refs/tags/v')) && '--require-tag' || '' }}

  build-python:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.publish == 'true' && inputs.release_version && format('v{0}', inputs.release_version) || github.ref }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Build python package
        run: |
          python -m pip install --upgrade pip
          pip install build
          rm -rf dist build ./*.egg-info
          python -m build
      - name: Upload Python dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-dist
          path: dist/

  build-npm-wrapper:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.publish == 'true' && inputs.release_version && format('v{0}', inputs.release_version) || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
      - name: Pack npm wrapper
        run: |
          cd packages/npm-wrapper
          npm pack
      - name: Upload npm tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-wrapper-tarball
          path: packages/npm-wrapper/*.tgz

  build-dotnet-tool:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.publish == 'true' && inputs.release_version && format('v{0}', inputs.release_version) || github.ref }}
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '8.0.x'
      - name: Restore .NET tool project
        run: dotnet restore "packages/dotnet-tool/SafeDeps.Tool.csproj"
      - name: Pack .NET global tool
        run: |
          mkdir -p artifacts/dotnet
          dotnet pack "packages/dotnet-tool/SafeDeps.Tool.csproj" -c Release
          find packages/dotnet-tool -type f -name "*.nupkg" ! -name "*.snupkg" -exec cp -f {} artifacts/dotnet/ \;
      - name: Verify NuGet package output
        run: |
          ls -la artifacts/dotnet
          COUNT=$(ls -1 artifacts/dotnet/*.nupkg 2>/dev/null | wc -l || true)
          if [ "${COUNT}" -eq 0 ]; then
            echo "No .nupkg produced by dotnet pack"
            exit 1
          fi
      - name: Upload NuGet package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dotnet-tool-nupkg
          path: artifacts/dotnet/*.nupkg
          if-no-files-found: error

  release-manifest:
    needs: [build-python, build-npm-wrapper, build-dotnet-tool]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.publish == 'true' && inputs.release_version && format('v{0}', inputs.release_version) || github.ref }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
      - name: Download Python dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-dist
          path: dist/
      - name: Download npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-wrapper-tarball
          path: packages/npm-wrapper/
      - name: Download NuGet package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotnet-tool-nupkg
          path: artifacts/dotnet/
      - name: Build release checksum manifest
        run: |
          VERSION="${{ inputs.release_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          python scripts/release/create_release_manifest.py --version "$VERSION"
      - name: Upload release manifest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-manifest
          path: release-artifacts/release-manifest.json

  publish-pypi:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true' }}
    needs: [build-python, release-manifest]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/safedeps
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-dist
          path: dist/
      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          print-hash: true
          verbose: true

  publish-npm:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true' }}
    needs: [build-npm-wrapper, release-manifest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-wrapper-tarball
          path: npm-dist/
      - name: Detect npm token
        id: npm_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "has_npm_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm_token=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify npm tarball
        run: |
          ls -la npm-dist
          TAR="$(realpath "$(ls -1 npm-dist/*.tgz | head -n 1)")"
          if [ -z "${TAR:-}" ] || [ ! -f "$TAR" ]; then
            echo "npm tarball not found in npm-dist/"
            exit 1
          fi
          echo "NPM_TARBALL=$TAR" >> "$GITHUB_ENV"
      - name: Publish to npm (NPM token fallback)
        if: ${{ steps.npm_token.outputs.has_npm_token == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "$NPM_TARBALL" --access public --provenance
      - name: Skip npm publish (missing token)
        if: ${{ steps.npm_token.outputs.has_npm_token == 'false' }}
        run: |
          echo "NPM_TOKEN is not configured. Skipping npm publish."

  publish-nuget:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true' }}
    needs: [build-dotnet-tool, release-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotnet-tool-nupkg
          path: dotnet-dist/
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '8.0.x'
      - name: Publish to NuGet (conditional)
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY is not configured. Skipping NuGet publish."
            exit 0
          fi
          dotnet nuget push "dotnet-dist/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${NUGET_API_KEY}"

  attest-build-provenance:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true' }}
    needs: [release-manifest]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download Python dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-dist
          path: dist/
      - name: Download npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-wrapper-tarball
          path: npm-dist/
      - name: Download NuGet package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotnet-tool-nupkg
          path: dotnet-dist/
      - name: Download release manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-manifest
          path: release-artifacts/
      - name: Attest build provenance
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          subject-path: |
            dist/*
            npm-dist/*
            dotnet-dist/*
            release-artifacts/release-manifest.json

  github-release:
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.publish == 'true' }}
    needs: [release-manifest, attest-build-provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.publish == 'true' && inputs.release_version && format('v{0}', inputs.release_version) || github.ref }}
      - name: Download Python dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-dist
          path: dist/
      - name: Download npm tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: npm-wrapper-tarball
          path: npm-dist/
      - name: Download NuGet package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dotnet-tool-nupkg
          path: dotnet-dist/
      - name: Download release manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: release-manifest
          path: release-artifacts/
      - name: Create GitHub release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          tag_name: ${{ inputs.release_version && format('v{0}', inputs.release_version) || github.ref_name }}
          name: ${{ inputs.release_version && format('SafeDeps {0} Beta Preview - Scoped Policy Gate', inputs.release_version) || format('{0} Beta Preview - Scoped Policy Gate', github.ref_name) }}
          body_path: RELEASE_NOTES_2026-06-21-0.6.0.md
          prerelease: true
          overwrite_files: true
          files: |
            dist/*
            npm-dist/*
            dotnet-dist/*
            release-artifacts/release-manifest.json
