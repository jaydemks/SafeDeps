name: E2E - pip Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bash:
    name: Bash - Python ${{ matrix.python-version }} / pip ${{ matrix.pip-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        pip-version: ["latest"]
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            pip-version: "23.3.2"
          - os: ubuntu-latest
            python-version: "3.12"
            pip-version: "24.0"
          - os: ubuntu-latest
            python-version: "3.12"
            pip-version: "24.3.1"
          - os: ubuntu-latest
            python-version: "3.12"
            pip-version: "25.0.1"
          - os: macos-latest
            python-version: "3.12"
            pip-version: "23.3.2"
          - os: macos-latest
            python-version: "3.12"
            pip-version: "24.0"
          - os: macos-latest
            python-version: "3.12"
            pip-version: "24.3.1"
          - os: macos-latest
            python-version: "3.12"
            pip-version: "25.0.1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SafeDeps from checkout
        shell: bash
        run: |
          if [ "${{ matrix.pip-version }}" = "latest" ]; then
            python -m pip install --upgrade pip
          else
            python -m pip install "pip==${{ matrix.pip-version }}"
          fi
          python -m pip install -e ".[dev]"
      - name: Run pip guard bash e2e suite
        shell: bash
        run: scripts/e2e/pip_guard_bash.sh

  powershell:
    name: PowerShell - Python ${{ matrix.python-version }} / pip ${{ matrix.pip-version }} on Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        pip-version: ["latest"]
        include:
          - python-version: "3.12"
            pip-version: "23.3.2"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install SafeDeps from checkout
        shell: pwsh
        run: |
          if ("${{ matrix.pip-version }}" -eq "latest") {
            python -m pip install --upgrade pip
          } else {
            python -m pip install "pip==${{ matrix.pip-version }}"
          }
          python -m pip install -e ".[dev]"
      - name: Run pip guard PowerShell e2e suite
        shell: pwsh
        run: .\scripts\e2e\pip_guard_pwsh.ps1

  cmd:
    name: CMD - Python 3.12 on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install SafeDeps from checkout
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Run pip guard CMD e2e suite
        shell: cmd
        run: call scripts\e2e\pip_guard_cmd.bat
