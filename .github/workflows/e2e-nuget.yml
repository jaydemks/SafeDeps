name: E2E - NuGet Validation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    name: NuGet scan - .NET ${{ matrix.dotnet-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ["8.0.x", "9.0.x"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
      - name: Install SafeDeps from checkout
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run NuGet scan e2e script
        shell: bash
        if: runner.os != 'Windows'
        run: bash scripts/e2e/nuget_scan_bash.sh
      - name: Run NuGet scan e2e script
        shell: pwsh
        if: runner.os == 'Windows'
        run: ./scripts/e2e/nuget_scan_pwsh.ps1
