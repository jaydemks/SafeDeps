repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: safedeps-scan
        name: safedeps scan
        entry: safedeps scan . --fail-on HIGH --out security-artifacts
        language: system
        pass_filenames: false
