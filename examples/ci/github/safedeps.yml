name: SafeDeps CI Template

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  safedeps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install SafeDeps
        run: |
          python -m pip install --upgrade pip
          pip install .
      - name: Run SafeDeps scan
        run: |
          safedeps scan . \
            --fail-on HIGH \
            --out security-artifacts \
            --sarif security-artifacts/safedeps.sarif \
            --cyclonedx security-artifacts/safedeps.cdx.json \
            --spdx security-artifacts/safedeps.spdx.json
      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: safedeps-security-artifacts
          path: security-artifacts/
